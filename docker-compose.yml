services:
  order-db:
    image: postgres:17-alpine
    container_name: order-db
    restart: always
    ports:
      - "5432:5432" # Sengaja dibuka agar kamu bisa cek database pakai DBeaver/DataGrip dari luar
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - order_db_data:/var/lib/postgresql/data

  order-service:
    image: dbigboss/order-service:v1
    # build: .  <-- Hapus tanda pagar (#) di awal baris ini jika kamu ingin build ulang langsung dari folder lokal
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Koneksi Database
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # Midtrans Configuration
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
      - MIDTRANS_IS_PRODUCTION=${MIDTRANS_IS_PRODUCTION}
      
      # Security & Auth
      - JWT_SECRET=${JWT_SECRET}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      
      # RajaOngkir Configuration
      - RAJAONGKIR_KEY=${RAJAONGKIR_KEY}
      - TOKO_ACTIVE_COURIERS=${TOKO_ACTIVE_COURIERS}
    depends_on:
      - order-db

volumes:
  order_db_data: